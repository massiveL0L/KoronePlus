<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pekora is taking a nap</title>

<style>
body {
    margin: 0;
    background: #181818;
    color: white;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.card {
    max-width: 600px;
}

h1 {
    font-size: 3em;
    margin-bottom: .3em;
}

p {
    font-size: 1.2em;
    color: #ccc;
}

button {
    margin-top: 20px;
    padding: 12px 24px;
    font-size: 1em;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <h1>🥕 Pekora.zip is temporarily unavailable</h1>

    <p>
        Cloudflare returned a 502 Bad Gateway.
        The server is probably restarting or overloaded.
    </p>

    <button onclick="location.reload()">
        Retry
    </button>
</div>

</body>
</html>
